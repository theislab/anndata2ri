version: 2
build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  apt_packages:
    - r-base-core
    - r-base-dev
    - libtirpc-dev  # https://bugs.launchpad.net/ubuntu/+source/r-base/+bug/2120296
  jobs:
    create_environment:
      - asdf plugin add r
      - R_EXTRA_CONFIGURE_OPTIONS='--enable-R-shlib --with-cairo' asdf install r latest
      - asdf global r latest
      - asdf plugin add uv
      - asdf install uv latest
      - asdf global uv latest
    build:
      html:
        - uvx hatch run docs:build -WT
        - mv docs/_build $READTHEDOCS_OUTPUT
