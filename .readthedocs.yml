version: 2
build:
  os: ubuntu-26.04
  tools:
    python: "3.14"
  apt_packages:
    - r-base
    - r-base-dev
  jobs:
    create_environment:
      - asdf plugin add uv
      - asdf install uv latest
      - asdf global uv latest
    build:
      html:
        - uvx hatch run docs:build -WT
        - mv docs/_build $READTHEDOCS_OUTPUT
